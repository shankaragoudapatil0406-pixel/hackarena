<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Dashboard – FarmDirect</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.dashboard-layout { display: grid; grid-template-columns: 240px 1fr; gap: 2rem; align-items: start; min-height: 80vh; }
.sidebar { background: var(--white); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-100); }
.sidebar-link { display:flex; align-items:center; gap:10px; padding:0.8rem 1rem; color:var(--gray-700); font-weight:600; text-decoration:none; border-radius:var(--radius-md); transition:var(--transition); margin-bottom:0.5rem; }
.sidebar-link:hover, .sidebar-link.active { background:var(--green-50); color:var(--green-700); }
.sidebar-link i { width:20px; text-align:center; }
.dashboard-content { background: var(--white); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-100); }
.product-table { width: 100%; border-collapse: collapse; }
.product-table th, .product-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--gray-100); }
.product-table th { font-weight: 700; color: var(--gray-500); font-size: 0.85rem; text-transform: uppercase; background:var(--gray-50); }
.product-table img { width: 50px; height: 50px; object-fit: cover; border-radius: var(--radius-sm); vertical-align: middle; margin-right: 12px; }
.product-table tr:hover { background: var(--gray-50); }
.action-btn { background:none; border:none; padding:6px; cursor:pointer; color:var(--gray-500); font-size:1.1rem; transition:var(--transition); }
.action-btn:hover { color:var(--green-600); }
.action-btn.delete:hover { color:#e53e3e; }
/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; display:none; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--white); border-radius:var(--radius-lg); width:100%; max-width:600px; max-height:90vh; overflow-y:auto; padding:2rem; animation:fadeInUp 0.3s ease; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
.modal-close { background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--gray-500); }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><span class="logo-icon">🌾</span> Farm<span>Direct</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a><a href="listings.html">Products</a><a href="farmer-dashboard.html" class="active">Dashboard</a>
    </div>
    <div class="nav-actions">
      <a href="#" class="btn btn-ghost btn-sm" id="logoutBtn" onclick="doLogout()"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </div>
  </div>
</nav>

<div class="page-header" style="padding: 2.5rem 0;">
  <div class="container">
    <h1 id="welcomeText">Farmer Dashboard</h1>
    <p>Manage your products, view orders, and update your profile.</p>
  </div>
</div>

<section class="section-sm">
  <div class="container">
    <div class="dashboard-layout">
      <aside class="sidebar">
        <a href="#" class="sidebar-link active"><i class="fa fa-box"></i> My Products</a>
        <a href="#" class="sidebar-link"><i class="fa fa-shopping-bag"></i> Orders</a>
        <a href="#" class="sidebar-link"><i class="fa fa-user"></i> Profile Details</a>
      </aside>
      
      <main class="dashboard-content">
        <div class="flex-between" style="margin-bottom: 1.5rem;">
          <h2 style="margin: 0;">My Products</h2>
          <button class="btn btn-primary" onclick="openAddProductModal()"><i class="fa fa-plus"></i> Add New Product</button>
        </div>
        
        <div style="overflow-x: auto;">
          <table class="product-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <tr><td colspan="5" class="text-center" style="padding: 3rem;">Loading your products...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>
</section>

<!-- Add Product Modal -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add New Product</h3>
      <button class="modal-close" onclick="closeProductModal()"><i class="fa fa-times"></i></button>
    </div>
    <div id="productForm">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="pName" class="form-control" placeholder="e.g. Organic Tomatoes">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="pCategory" class="form-control">
            <option>Vegetables</option>
            <option>Fruits</option>
            <option>Grains</option>
            <option>Dairy</option>
            <option>Herbs</option>
          </select>
        </div>
        <div class="form-group">
          <label>Unit (e.g. kg, dozen, bunch)</label>
          <input type="text" id="pUnit" class="form-control" placeholder="kg" value="kg">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" id="pPrice" class="form-control" placeholder="0">
        </div>
        <div class="form-group">
          <label>Stock Available</label>
          <input type="number" id="pStock" class="form-control" placeholder="100">
        </div>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="pImage" class="form-control" placeholder="https://images.unsplash.com/photo-..." value="https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=400&q=80">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="pDesc" class="form-control" rows="3" placeholder="Describe your product..."></textarea>
      </div>
      <button class="btn btn-primary" style="width: 100%;" onclick="submitProduct()">Save Product</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js?v=2"></script>
<script src="js/db.js?v=2"></script>
<script>
let currentUser = null;
let currentFarmer = null;

async function init() {
  currentUser = Auth.getUser();
  if (!currentUser) {
    window.location.href = 'auth.html';
    return;
  }
  
  if (currentUser.user_metadata?.role !== 'farmer') {
    document.body.innerHTML = '<div style="padding: 5rem; text-align: center;"><h2>Access Denied</h2><p>This page is only for registered farmers.</p><a href="index.html" class="btn btn-primary mt-2">Go to Home</a></div>';
    return;
  }

  document.getElementById('welcomeText').textContent = 'Welcome, ' + (currentUser.user_metadata?.name || 'Farmer');
  currentFarmer = await ensureFarmerRecord(currentUser);
  
  if(currentFarmer) {
    loadMyProducts();
  }
}

async function loadMyProducts() {
  if(!currentFarmer) return;
  const products = await getFarmerProducts(currentFarmer.id);
  const tbody = document.getElementById('productsTableBody');
  if (products.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="text-center" style="padding: 3rem;">You have not added any products yet.</td></tr>';
    return;
  }
  
  tbody.innerHTML = products.map(p => `
    <tr>
      <td><img src="${p.image}" alt="${p.name}"> <strong>${p.name}</strong></td>
      <td><span class="badge badge-green">${p.category}</span></td>
      <td>₹${p.price}/${p.unit}</td>
      <td>${p.stock}</td>
      <td>
        <button class="action-btn delete" onclick="deleteMyProduct('${p.id}')" title="Delete"><i class="fa fa-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

function openAddProductModal() {
  document.getElementById('productModal').classList.add('open');
  document.getElementById('pName').value = '';
  document.getElementById('pPrice').value = '';
  document.getElementById('pStock').value = '100';
  document.getElementById('pDesc').value = '';
}

function closeProductModal() {
  document.getElementById('productModal').classList.remove('open');
}

async function submitProduct() {
  const name = document.getElementById('pName').value.trim();
  const category = document.getElementById('pCategory').value;
  const unit = document.getElementById('pUnit').value.trim() || 'kg';
  const price = parseInt(document.getElementById('pPrice').value) || 0;
  const stock = parseInt(document.getElementById('pStock').value) || 0;
  const image = document.getElementById('pImage').value.trim();
  const description = document.getElementById('pDesc').value.trim();

  if (!name || !price) {
    showToast('Name and price are required', 'error');
    return;
  }

  const pId = 'P' + Date.now().toString().slice(-8);

  const newProduct = {
    id: pId,
    farmer_id: currentFarmer.id,
    name,
    category,
    price,
    unit,
    stock,
    image,
    description,
    rating: 0,
    rating_count: 0
  };

  const saved = await addProduct(newProduct);
  if (saved) {
    showToast('Product added successfully!');
    closeProductModal();
    loadMyProducts();
  } else {
    showToast('Error adding product', 'error');
  }
}

async function deleteMyProduct(id) {
  if(!confirm('Are you sure you want to delete this product?')) return;
  const success = await deleteProduct(id);
  if (success) {
    showToast('Product deleted');
    loadMyProducts();
  } else {
    showToast('Failed to delete product', 'error');
  }
}

async function doLogout() {
  await Auth.signOut();
}

function showToast(msg, type='') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<i class="fa ${type==='error'?'fa-exclamation-circle':'fa-check-circle'}"></i> ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.style.animation='slideOutRight 0.3s ease forwards'; setTimeout(()=>el.remove(),300); }, 2500);
}

// Initialize on load
init();
</script>
</body>
</html>
