<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Profile – FarmDirect</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.farmer-hero { background:linear-gradient(135deg,var(--green-900),var(--green-700)); position:relative; padding:4rem 0 3rem; overflow:hidden; }
.farmer-hero::before { content:''; position:absolute; inset:0; background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
.farmer-profile-card { display:flex; align-items:center; gap:2.5rem; position:relative; z-index:1; flex-wrap:wrap; }
.farmer-avatar-lg { width:130px; height:130px; border-radius:50%; object-fit:cover; border:5px solid rgba(255,255,255,.3); box-shadow:0 8px 30px rgba(0,0,0,.3); flex-shrink:0; }
.farmer-hero-info { color:#fff; flex:1; }
.farmer-hero-info h1 { font-size:2.2rem; margin-bottom:0.3rem; }
.farmer-hero-info .farmer-loc-big { font-size:1rem; color:rgba(255,255,255,.75); margin-bottom:0.8rem; }
.farmer-hero-stats { display:flex; gap:2rem; flex-wrap:wrap; margin-top:1.5rem; }
.fhs { text-align:center; }
.fhs .fhs-num { font-family:var(--font-head); font-size:1.8rem; font-weight:800; display:block; color:var(--amber-400); }
.fhs .fhs-label { font-size:0.78rem; color:rgba(255,255,255,.65); }
.certs-wrap { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:1rem; }
.farmer-about { background:var(--white); border-radius:var(--radius-lg); padding:1.8rem 2rem; border:1px solid var(--gray-100); margin-bottom:2rem; }
.farmer-about p { color:var(--gray-700); line-height:1.8; font-size:0.95rem; }
.product-count-badge { display:inline-flex; align-items:center; gap:6px; background:var(--green-100); color:var(--green-800); padding:6px 16px; border-radius:var(--radius-full); font-size:0.85rem; font-weight:700; margin-bottom:1.5rem; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><span class="logo-icon">🌾</span> Farm<span>Direct</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a><a href="listings.html" class="active">Products</a><a href="tracking.html">Track Order</a><a href="auth.html">Sign In</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" class="cart-btn"><i class="fa fa-shopping-basket"></i><span class="cart-badge" id="navCartCount">0</span></a>
    </div>
  </div>
</nav>

<div id="farmerHero" class="farmer-hero">
  <div class="container">
    <div class="breadcrumb" style="color:rgba(255,255,255,.6);margin-bottom:1.5rem;">
      <a href="index.html" style="color:rgba(255,255,255,.6)">Home</a> <i class="fa fa-chevron-right"></i>
      <a href="listings.html" style="color:rgba(255,255,255,.6)">Products</a> <i class="fa fa-chevron-right"></i>
      <span id="breadFarmer" style="color:#fff;">Farmer Profile</span>
    </div>
    <div class="farmer-profile-card" id="farmerProfileCard">
      <div style="color:#fff;padding:3rem 0;">Loading…</div>
    </div>
  </div>
</div>

<section class="section-sm">
  <div class="container">
    <div class="grid-2" id="farmerContent">
      <div style="padding:3rem;text-align:center;">Loading…</div>
    </div>
  </div>
</section>

<section style="background:var(--earth-50);padding:3rem 0;">
  <div class="container">
    <div class="flex-between mb-2">
      <h2 id="productsHeading">Products</h2>
      <span class="product-count-badge" id="productCountBadge"></span>
    </div>
    <div class="grid-4" id="farmerProducts"></div>
  </div>
</section>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script>
const params = new URLSearchParams(location.search);
const farmerId = params.get('id') || 'f1';

function updateCartBadge(){ const c=Cart.count(); document.getElementById('navCartCount').textContent=c; document.getElementById('navCartCount').style.display=c>0?'flex':'none'; }
updateCartBadge();
window.addEventListener('cartUpdated', updateCartBadge);

function renderStars(r){ return [1,2,3,4,5].map(i=>`<span class="star ${i<=Math.floor(r)?'filled':i-0.5<=r?'half':''}">★</span>`).join(''); }

async function renderFarmerPage(){
  const farmer = await getFarmer(farmerId);
  if(!farmer){ return; }
  const products = await getFarmerProducts(farmerId);
  const avgRating = farmer.rating;
  const totalReviews = farmer.reviews;
  document.title = farmer.name+' – FarmDirect';
  document.getElementById('breadFarmer').textContent = farmer.name;

  document.getElementById('farmerProfileCard').innerHTML = `
    <img class="farmer-avatar-lg" src="${farmer.avatar}" alt="${farmer.name}">
    <div class="farmer-hero-info">
      <h1>${farmer.name}</h1>
      <div class="farmer-loc-big"><i class="fa fa-map-marker-alt"></i> ${farmer.location}</div>
      <div style="display:flex;align-items:center;gap:8px;">
        ${renderStars(avgRating)}
        <span style="color:#fff;font-weight:700;">${avgRating}</span>
        <span style="color:rgba(255,255,255,.65);font-size:0.85rem;">(${totalReviews} reviews)</span>
      </div>
      <div class="certs-wrap">${(farmer.certified||[]).map(c=>`<span class="badge badge-amber"><i class="fa fa-certificate"></i> ${c}</span>`).join('')}</div>
      <div class="farmer-hero-stats">
        <div class="fhs"><span class="fhs-num">${products.length}</span><span class="fhs-label">Products</span></div>
        <div class="fhs"><span class="fhs-num">${totalReviews}</span><span class="fhs-label">Reviews</span></div>
        <div class="fhs"><span class="fhs-num">${new Date().getFullYear()-farmer.since}</span><span class="fhs-label">Yrs Farming</span></div>
        <div class="fhs"><span class="fhs-num">${(totalReviews*12).toLocaleString('en-IN')}</span><span class="fhs-label">Customers</span></div>
      </div>
    </div>
    <div style="position:relative;z-index:1;">
      <button class="btn btn-amber" onclick="contactFarmer()"><i class="fa fa-comment"></i> Message Farmer</button>
    </div>`;

  document.getElementById('farmerContent').innerHTML = `
    <div class="farmer-about">
      <h3 style="margin-bottom:0.75rem;"><i class="fa fa-user-circle text-green"></i> About ${farmer.name}</h3>
      <p>${farmer.bio}</p>
      <div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:1.2rem;">
        <div style="font-size:0.84rem;color:var(--gray-500);"><i class="fa fa-calendar text-green"></i> Farming since <strong>${farmer.since}</strong></div>
        <div style="font-size:0.84rem;color:var(--gray-500);"><i class="fa fa-map-marker-alt text-green"></i> <strong>${farmer.location}</strong></div>
      </div>
    </div>
    <div class="farmer-about">
      <h3 style="margin-bottom:0.75rem;"><i class="fa fa-certificate text-green"></i> Certifications</h3>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1rem;">
        ${farmer.certified.map(c=>`<div class="badge badge-green" style="padding:8px 16px;font-size:0.82rem;"><i class="fa fa-check-circle"></i> ${c} Certified</div>`).join('')}
      </div>
      <p style="font-size:0.84rem;color:var(--gray-500);">All certifications are verified by FarmDirect. Documents are available on request.</p>
    </div>`;

  document.getElementById('productsHeading').textContent = `Products by ${farmer.name}`;
  document.getElementById('productCountBadge').innerHTML = `<i class="fa fa-box-open"></i> ${products.length} products`;

  document.getElementById('farmerProducts').innerHTML = products.map(p=>`
    <div class="card product-card fade-in-up">
      <div class="card-img-wrap">
        <img src="${p.image}" alt="${p.name}" loading="lazy">
        <span class="badge badge-green card-cat">${p.category}</span>
      </div>
      <div class="card-body">
        <div class="card-title"><a href="product.html?id=${p.id}" style="color:inherit;">${p.name}</a></div>
        <div class="card-rating">${renderStars(p.rating)} <span>(${p.rating_count})</span></div>
        <div class="card-footer">
          <div class="card-price">₹${p.price}<small>/${p.unit}</small></div>
          <button class="btn btn-primary btn-sm" onclick="addCart('${p.id}')"><i class="fa fa-plus"></i> Add</button>
        </div>
      </div>
    </div>`).join('');
}

function addCart(id){ Cart.add(id,1); updateCartBadge(); showToast('Added to cart! 🛒'); }
function contactFarmer(){ showToast('Messaging feature coming soon! 📩'); }

function showToast(msg,type=''){
  const el=document.createElement('div'); el.className=`toast ${type}`; el.innerHTML=`<i class="fa ${type==='error'?'fa-exclamation-circle':'fa-check-circle'}"></i> ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.style.animation='slideOutRight 0.3s ease forwards'; setTimeout(()=>el.remove(),300); },2500);
}

renderFarmerPage();
</script>
</body>
</html>
